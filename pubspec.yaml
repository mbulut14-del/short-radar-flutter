name: short_radar_flutter
description: Short Radar Pro
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_local_notifications: ^17.0.0
  syncfusion_flutter_charts: ^27.1.57

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/bg.png
    - assets/hero.png
    - assets/ic_launcher.png
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/ic_launcher.png"
