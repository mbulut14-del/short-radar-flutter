name: Build APK

on:
  push:
    branches:
      - restore-201f7ac
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Workspace listele
        run: ls -la

      - name: Bozuk android girdisini temizle
        run: |
          if [ -e android ]; then
            echo "android girdisi bulundu, siliniyor..."
            rm -rf android
          fi

          if [ -e Android ]; then
            echo "Android girdisi bulundu, siliniyor..."
            rm -rf Android
          fi

          ls -la

      - name: Android proje olustur
        run: flutter create . --project-name short_radar_flutter --platforms=android

      - name: Android ayarlarini guncelle
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import re

          def replace_if_exists(path_str, replacements):
              path = Path(path_str)
              if not path.exists():
                  return False

              text = path.read_text(encoding="utf-8")

              for pattern, repl in replacements:
                  text = re.sub(pattern, repl, text, flags=re.MULTILINE)

              path.write_text(text, encoding="utf-8")
              return True

          def ensure_permission(text, permission):
              line = f'<uses-permission android:name="{permission}"/>'
              if permission not in text:
                  text = text.replace(
                      '<application',
                      f'{line}\n    <application',
                      1
                  )
              return text

          def ensure_service(text):
              service_name = 'com.pravera.flutter_foreground_task.service.ForegroundService'

              if service_name in text:
                  text = re.sub(
                      r'<service\s+android:name="com\.pravera\.flutter_foreground_task\.service\.ForegroundService"[^>]*?/>',
                      (
                          '<service\n'
                          '            android:name="com.pravera.flutter_foreground_task.service.ForegroundService"\n'
                          '            android:exported="false"\n'
                          '            android:foregroundServiceType="dataSync" />'
                      ),
                      text,
                      flags=re.DOTALL,
                  )
                  return text

              service_block = (
                  '        <service\n'
                  '            android:name="com.pravera.flutter_foreground_task.service.ForegroundService"\n'
                  '            android:exported="false"\n'
                  '            android:foregroundServiceType="dataSync" />\n'
              )

              text = text.replace('</application>', f'{service_block}    </application>', 1)
              return text

          # settings.gradle
          replace_if_exists(
              "android/settings.gradle",
              [
                  (
                      r'id "org\.jetbrains\.kotlin\.android" version "[^"]+"',
                      'id "org.jetbrains.kotlin.android" version "1.9.22"',
                  ),
              ],
          )

          # settings.gradle.kts
          replace_if_exists(
              "android/settings.gradle.kts",
              [
                  (
                      r'id\("org\.jetbrains\.kotlin\.android"\) version "[^"]+"',
                      'id("org.jetbrains.kotlin.android") version "1.9.22"',
                  ),
              ],
          )

          # build.gradle
          replace_if_exists(
              "android/build.gradle",
              [
                  (
                      r'ext\.kotlin_version\s*=\s*[\'"][^\'"]+[\'"]',
                      'ext.kotlin_version = "1.9.22"',
                  ),
              ],
          )

          # build.gradle.kts
          replace_if_exists(
              "android/build.gradle.kts",
              [
                  (
                      r'kotlin\("android"\) version "[^"]+"',
                      'kotlin("android") version "1.9.22"',
                  ),
              ],
          )

          # app/build.gradle
          replace_if_exists(
              "android/app/build.gradle",
              [
                  (r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 23'),
                  (r'minSdkVersion\s+flutter\.minSdkVersion', 'minSdkVersion 23'),
                  (r'minSdkVersion\s+21', 'minSdkVersion 23'),
                  (r'targetSdkVersion\s+flutter\.targetSdkVersion', 'targetSdkVersion 34'),
                  (r'targetSdkVersion\s+33', 'targetSdkVersion 34'),
                  (r'compileSdkVersion\s+flutter\.compileSdkVersion', 'compileSdkVersion 34'),
                  (r'compileSdkVersion\s+33', 'compileSdkVersion 34'),
              ],
          )

          # app/build.gradle.kts
          replace_if_exists(
              "android/app/build.gradle.kts",
              [
                  (r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 23'),
                  (r'minSdk\s*=\s*21', 'minSdk = 23'),
                  (r'targetSdk\s*=\s*flutter\.targetSdkVersion', 'targetSdk = 34'),
                  (r'targetSdk\s*=\s*33', 'targetSdk = 34'),
                  (r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 34'),
                  (r'compileSdk\s*=\s*33', 'compileSdk = 34'),
              ],
          )

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          if manifest.exists():
              text = manifest.read_text(encoding="utf-8")

              # Gerekli izinler
              text = ensure_permission(text, "android.permission.INTERNET")
              text = ensure_permission(text, "android.permission.POST_NOTIFICATIONS")
              text = ensure_permission(text, "android.permission.FOREGROUND_SERVICE")
              text = ensure_permission(text, "android.permission.FOREGROUND_SERVICE_DATA_SYNC")
              text = ensure_permission(text, "android.permission.WAKE_LOCK")
              text = ensure_permission(text, "android.permission.RECEIVE_BOOT_COMPLETED")

              # Uygulama adi
              text = text.replace(
                  'android:label="short_radar_flutter"',
                  'android:label="Short Radar Pro"'
              )

              # flutter_foreground_task servisi
              text = ensure_service(text)

              manifest.write_text(text, encoding="utf-8")
          PY

      - name: Paketleri yukle
        run: flutter pub get

      - name: Clean build cache
        run: |
          rm -rf build
          rm -rf .dart_tool
          flutter clean

      - name: Android dosyalarini listele
        run: |
          echo "===== android/settings.gradle ====="
          [ -f android/settings.gradle ] && cat android/settings.gradle || true
          echo "===== android/settings.gradle.kts ====="
          [ -f android/settings.gradle.kts ] && cat android/settings.gradle.kts || true

          echo "===== android/build.gradle ====="
          [ -f android/build.gradle ] && cat android/build.gradle || true
          echo "===== android/build.gradle.kts ====="
          [ -f android/build.gradle.kts ] && cat android/build.gradle.kts || true

          echo "===== android/app/build.gradle ====="
          [ -f android/app/build.gradle ] && cat android/app/build.gradle || true
          echo "===== android/app/build.gradle.kts ====="
          [ -f android/app/build.gradle.kts ] && cat android/app/build.gradle.kts || true

          echo "===== android/app/src/main/AndroidManifest.xml ====="
          cat android/app/src/main/AndroidManifest.xml

      - name: Paketleri yeniden yukle
        run: flutter pub get

      - name: Uygulama ikonunu olustur
        run: dart run flutter_launcher_icons

      - name: APK build
        run: flutter build apk --release

      - name: APK upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
