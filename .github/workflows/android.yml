name: Build APK

on:
  push:
    branches:
      - restore-201f7ac
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Paketleri yukle
        run: flutter pub get

      - name: Android proje olustur
        run: flutter create . --project-name short_radar_flutter --platforms=android

      - name: Uygulama adini degistir
        run: |
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">Short Radar Pro</string>
          </resources>
          EOF

      - name: APK build
        run: flutter build apk --release

      - name: APK upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
