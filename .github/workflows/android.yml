name: Build APK

on:
  push:
    branches:
      - restore-201f7ac
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Workspace listele
        run: ls -la

      - name: Bozuk android girdisini temizle
        run: |
          if [ -e android ]; then
            echo "android girdisi bulundu, siliniyor..."
            rm -rf android
          fi

          if [ -e Android ]; then
            echo "Android girdisi bulundu, siliniyor..."
            rm -rf Android
          fi

          ls -la

      - name: Android proje olustur
        run: flutter create . --project-name short_radar_flutter --platforms=android

      - name: Android ayarlarini guncelle
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import re

          settings = Path("android/settings.gradle")
          if settings.exists():
              text = settings.read_text(encoding="utf-8")
              text = re.sub(
                  r'id "org\.jetbrains\.kotlin\.android" version "[^"]+"',
                  'id "org.jetbrains.kotlin.android" version "1.9.22"',
                  text
              )
              settings.write_text(text, encoding="utf-8")

          app_build = Path("android/app/build.gradle")
          if app_build.exists():
              text = app_build.read_text(encoding="utf-8")

              text = re.sub(
                  r'minSdk\s*=\s*flutter\.minSdkVersion',
                  'minSdk = 23',
                  text
              )

              text = re.sub(
                  r'minSdkVersion\s+flutter\.minSdkVersion',
                  'minSdkVersion 23',
                  text
              )

              text = re.sub(
                  r'minSdkVersion\s+21',
                  'minSdkVersion 23',
                  text
              )

              app_build.write_text(text, encoding="utf-8")

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          if manifest.exists():
              text = manifest.read_text(encoding="utf-8")

              if 'android.permission.INTERNET' not in text:
                  text = text.replace(
                      '<application',
                      '<uses-permission android:name="android.permission.INTERNET"/>\n    <application'
                  )

              text = text.replace(
                  'android:label="short_radar_flutter"',
                  'android:label="Short Radar Pro"'
              )

              manifest.write_text(text, encoding="utf-8")
          PY

      - name: Paketleri yukle
        run: flutter pub get

      - name: Android dosyalarini listele
        run: |
          echo "===== android/app/build.gradle ====="
          cat android/app/build.gradle
          echo "===== android/app/src/main/AndroidManifest.xml ====="
          cat android/app/src/main/AndroidManifest.xml

      - name: Uygulama ikonunu olustur
        run: dart run flutter_launcher_icons

      - name: APK build
        run: flutter build apk --release

      - name: APK upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
