name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"

      - name: Proje olustur
        run: flutter create app

      - name: Dosyalari kopyala
        run: |
          rm -rf app/lib
          cp -r lib app/lib

          cp pubspec.yaml app/pubspec.yaml

      - name: Paketleri yukle
        run: |
          cd app
          flutter pub get

      - name: APK build
        run: |
          cd app
          flutter build apk --release

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/app/outputs/flutter-apk/app-release.apk
