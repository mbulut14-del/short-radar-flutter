name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Temiz proje olustur
        run: flutter create temp_app

      - name: Dosyalari kopyala
        run: |
          rm -rf temp_app/lib
          cp -r lib temp_app/lib

          rm -rf temp_app/assets
          if [ -d assets ]; then cp -r assets temp_app/assets; fi

          cp pubspec.yaml temp_app/pubspec.yaml

      - name: Build al
        run: |
          cd temp_app
          flutter pub get
          flutter build apk --release

      - name: APK upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
